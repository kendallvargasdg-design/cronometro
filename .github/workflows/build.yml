name: 🏗️ Construir APK Cronómetro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          path: mysrc

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: 📦 Generar estructura Android
        run: |
          flutter create \
            --project-name cronometro_flotante \
            --org com.cronometro \
            --platforms android \
            cronometro_flotante

      - name: 📋 Copiar código fuente
        run: |
          cp -rf mysrc/cronometro_flotante/lib/* cronometro_flotante/lib/
          cp mysrc/cronometro_flotante/pubspec.yaml cronometro_flotante/pubspec.yaml

      - name: ⚙️ Configurar AndroidManifest para PiP
        working-directory: cronometro_flotante
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:name=".MainActivity"/android:name=".MainActivity"\n            android:supportsPictureInPicture="true"\n            android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation"/' "$MANIFEST"
          echo "--- AndroidManifest actualizado ---"
          grep -A3 "MainActivity" "$MANIFEST"

      - name: ⚙️ Configurar versiones Android SDK
        working-directory: cronometro_flotante
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/' "$GRADLE"
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' "$GRADLE"
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' "$GRADLE"
          echo "--- build.gradle actualizado ---"
          grep -E "SdkVersion" "$GRADLE"

      - name: 📚 Instalar dependencias Flutter
        working-directory: cronometro_flotante
        run: flutter pub get

      - name: 🔨 Construir APK
        working-directory: cronometro_flotante
        run: flutter build apk --debug --no-shrink

      - name: 📤 Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: cronometro-flotante-v2.0
          path: cronometro_flotante/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: ✅ Build completado
        run: echo "APK listo — Ve a Actions → cronometro-flotante-v2.0 → Download"
