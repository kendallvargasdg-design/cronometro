name: 🏗️ Construir APK Cronómetro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          path: mysrc

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: 📦 Generar estructura Android
        run: |
          flutter create \
            --project-name cronometro_flotante \
            --org com.cronometro \
            --platforms android \
            cronometro_flotante

      - name: 📋 Copiar código fuente
        run: |
          cp -rf mysrc/cronometro_flotante/lib/* cronometro_flotante/lib/
          cp mysrc/cronometro_flotante/pubspec.yaml cronometro_flotante/pubspec.yaml

      - name: 🔒 Configurar AndroidManifest
        working-directory: cronometro_flotante
        run: |
          python3 << 'EOF'
          import re

          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          # Solo agregar supportsPictureInPicture — sin permisos extra
          content = re.sub(
              r'(<activity\b)',
              r'\1 android:supportsPictureInPicture="true"',
              content,
              count=1
          )

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("AndroidManifest OK")
          EOF

      - name: ⚙️ Configurar versiones Android SDK
        working-directory: cronometro_flotante
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/' "$GRADLE"
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' "$GRADLE"
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' "$GRADLE"

      - name: 🤖 Crear MainActivity.kt
        working-directory: cronometro_flotante
        run: |
          mkdir -p android/app/src/main/kotlin/com/cronometro/cronometro_flotante
          cat > android/app/src/main/kotlin/com/cronometro/cronometro_flotante/MainActivity.kt << 'KOTLIN'
          package com.cronometro.cronometro_flotante

          import android.app.PendingIntent
          import android.app.PictureInPictureParams
          import android.app.RemoteAction
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.content.IntentFilter
          import android.content.res.Configuration
          import android.graphics.drawable.Icon
          import android.os.Build
          import android.util.Rational
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {

              private val CHANNEL = "cronometro/pip"
              private val ACTION_CONTROL = "com.cronometro.pip.action"
              private var methodChannel: MethodChannel? = null
              private var isRunning = false

              private val pipReceiver = object : BroadcastReceiver() {
                  override fun onReceive(ctx: Context?, intent: Intent?) {
                      val control = intent?.getStringExtra("control") ?: return
                      methodChannel?.invokeMethod("pipAction", control)
                  }
              }

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)

                  methodChannel = MethodChannel(
                      flutterEngine.dartExecutor.binaryMessenger, CHANNEL
                  )

                  methodChannel!!.setMethodCallHandler { call, result ->
                      when (call.method) {
                          "enterPiP" -> {
                              isRunning = call.argument<Boolean>("isRunning") ?: false
                              result.success(null)
                              enterPiPMode()
                          }
                          "updatePiP" -> {
                              isRunning = call.argument<Boolean>("isRunning") ?: false
                              updatePiPParams()
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(pipReceiver,
                          IntentFilter(ACTION_CONTROL),
                          Context.RECEIVER_NOT_EXPORTED)
                  } else {
                      @Suppress("UnspecifiedRegisterReceiverFlag")
                      registerReceiver(pipReceiver, IntentFilter(ACTION_CONTROL))
                  }
              }

              private fun makeIntent(control: String, code: Int): PendingIntent {
                  val i = Intent(ACTION_CONTROL).putExtra("control", control)
                  return PendingIntent.getBroadcast(
                      this, code, i,
                      PendingIntent.FLAG_IMMUTABLE or PendingIntent.FLAG_UPDATE_CURRENT
                  )
              }

              private fun buildPiPParams(): PictureInPictureParams {
                  val builder = PictureInPictureParams.Builder()
                      .setAspectRatio(Rational(16, 9))

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val playIcon = Icon.createWithResource(this,
                          if (isRunning) android.R.drawable.ic_media_pause
                          else android.R.drawable.ic_media_play)
                      val playLabel = if (isRunning) "Pausar" else "Iniciar"

                      builder.setActions(listOf(
                          RemoteAction(playIcon, playLabel, playLabel, makeIntent("play", 1)),
                          RemoteAction(
                              Icon.createWithResource(this, android.R.drawable.ic_menu_revert),
                              "Reset", "Reset", makeIntent("reset", 2)
                          ),
                          RemoteAction(
                              Icon.createWithResource(this, android.R.drawable.ic_menu_add),
                              "LAP", "LAP", makeIntent("lap", 3)
                          )
                      ))
                  }

                  return builder.build()
              }

              private fun enterPiPMode() {
                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          enterPictureInPictureMode(buildPiPParams())
                      }
                  } catch (e: Exception) {}
              }

              private fun updatePiPParams() {
                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O && isInPictureInPictureMode) {
                          setPictureInPictureParams(buildPiPParams())
                      }
                  } catch (e: Exception) {}
              }

              override fun onPictureInPictureModeChanged(
                  isInPictureInPictureMode: Boolean,
                  newConfig: Configuration
              ) {
                  super.onPictureInPictureModeChanged(isInPictureInPictureMode, newConfig)
                  if (!isInPictureInPictureMode) {
                      methodChannel?.invokeMethod("pipExited", null)
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  try { unregisterReceiver(pipReceiver) } catch (_: Exception) {}
              }
          }
          KOTLIN

      - name: 📚 Instalar dependencias Flutter
        working-directory: cronometro_flotante
        run: flutter pub get

      - name: 🔨 Construir APK
        working-directory: cronometro_flotante
        run: flutter build apk --debug --no-shrink

      - name: 📤 Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: cronometro-flotante-v6.0
          path: cronometro_flotante/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: ✅ Build completado
        run: echo "APK listo → Actions → cronometro-flotante-v6.0 → Download"
