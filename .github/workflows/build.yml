name: 🏗️ Construir APK Cronómetro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          path: mysrc

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: 📦 Generar estructura Android
        run: |
          flutter create \
            --project-name cronometro_flotante \
            --org com.cronometro \
            --platforms android \
            cronometro_flotante

      - name: 📋 Copiar código fuente
        run: |
         cp -rf mysrc/cronometro_flotante/lib/* cronometro_flotante/lib/
          cp mysrc/cronometro_flotante/pubspec.yaml cronometro_flotante/pubspec.yaml

      - name: 🔒 Configurar AndroidManifest
        working-directory: cronometro_flotante
        run: |
          python3 << 'EOF'
          import re

          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          # Permisos necesarios
          perms = (
              '    <uses-permission android:name="android.permission.INTERNET"/>\n'
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n'
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>\n'
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>'
          )
          content = re.sub(
              r'<uses-permission android:name="android\.permission\.INTERNET"/>',
              perms,
              content
          )

          # Solo agregar supportsPictureInPicture (configChanges ya existe en el manifest de Flutter)
          content = re.sub(
              r'(<activity\b)',
              r'\1 android:supportsPictureInPicture="true"',
              content,
              count=1
          )

          # Declarar el servicio
          service = (
              '        <service\n'
              '            android:name=".CronometroService"\n'
              '            android:foregroundServiceType="dataSync"\n'
              '            android:exported="false"/>\n'
          )
          content = content.replace('    </application>', service + '    </application>')

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("AndroidManifest OK")
          EOF
      - name: ⚙️ Configurar versiones Android SDK
        working-directory: cronometro_flotante
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/' "$GRADLE"
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' "$GRADLE"
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' "$GRADLE"
          echo "--- build.gradle ---"
          grep -E "SdkVersion" "$GRADLE"

      - name: 🤖 Crear CronometroService.kt
        working-directory: cronometro_flotante
        run: |
          mkdir -p android/app/src/main/kotlin/com/cronometro/cronometro_flotante
          cat > android/app/src/main/kotlin/com/cronometro/cronometro_flotante/CronometroService.kt << 'KOTLIN'
          package com.cronometro.cronometro_flotante

          import android.app.*
          import android.content.Intent
          import android.os.Build
          import android.os.IBinder
          import androidx.core.app.NotificationCompat

          class CronometroService : Service() {

              companion object {
                  const val NOTIF_ID = 1001
                  const val NOTIF_CHANNEL_ID = "cronometro_channel"
                  const val ACTION_PIP = "com.cronometro.pip.action"
                  const val EXTRA_CONTROL = "control"
                  const val EXTRA_TIME = "time"
                  const val EXTRA_IS_RUNNING = "isRunning"
              }

              override fun onBind(intent: Intent?): IBinder? = null

              override fun onCreate() {
                  super.onCreate()
                  createNotificationChannel()
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  val time = intent?.getStringExtra(EXTRA_TIME) ?: "00:00.00"
                  val isRunning = intent?.getBooleanExtra(EXTRA_IS_RUNNING, false) ?: false
                  val notification = buildNotification(time, isRunning)
                  try {
                      if (Build.VERSION.SDK_INT >= 34) {
                          startForeground(NOTIF_ID, notification,
                              android.content.pm.ServiceInfo.FOREGROUND_SERVICE_TYPE_DATA_SYNC)
                      } else {
                          startForeground(NOTIF_ID, notification)
                      }
                  } catch (e: Exception) {
                      // MIUI puede bloquear el servicio — continuar sin crash
                  }
                  return START_NOT_STICKY
              }

              private fun buildNotification(time: String, isRunning: Boolean): Notification {
                  val openIntent = PendingIntent.getActivity(
                      this, 0,
                      packageManager.getLaunchIntentForPackage(packageName),
                      PendingIntent.FLAG_IMMUTABLE or PendingIntent.FLAG_UPDATE_CURRENT
                  )

                  fun actionIntent(control: String): PendingIntent {
                      val i = Intent(ACTION_PIP).apply { putExtra(EXTRA_CONTROL, control) }
                      return PendingIntent.getBroadcast(
                          this, control.hashCode(), i,
                          PendingIntent.FLAG_IMMUTABLE or PendingIntent.FLAG_UPDATE_CURRENT
                      )
                  }

                  val playLabel = if (isRunning) "⏸ Pausar" else "▶ Iniciar"

                  return NotificationCompat.Builder(this, NOTIF_CHANNEL_ID)
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setContentTitle("⏱ Cronómetro Flotante")
                      .setContentText(time)
                      .setContentIntent(openIntent)
                      .setOngoing(true)
                      .setOnlyAlertOnce(true)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .addAction(0, playLabel, actionIntent("play"))
                      .addAction(0, "↺ Reset", actionIntent("reset"))
                      .addAction(0, "LAP", actionIntent("lap"))
                      .build()
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val ch = NotificationChannel(
                          NOTIF_CHANNEL_ID, "Cronómetro",
                          NotificationManager.IMPORTANCE_LOW
                      ).apply { description = "Control del cronómetro flotante" }
                      (getSystemService(NOTIFICATION_SERVICE) as NotificationManager)
                          .createNotificationChannel(ch)
                  }
              }
          }
          KOTLIN

      - name: 🤖 Crear MainActivity.kt
        working-directory: cronometro_flotante
        run: |
          cat > android/app/src/main/kotlin/com/cronometro/cronometro_flotante/MainActivity.kt << 'KOTLIN'
          package com.cronometro.cronometro_flotante

          import android.app.PictureInPictureParams
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.content.IntentFilter
          import android.os.Build
          import android.util.Rational
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {

              private val CHANNEL = "cronometro/pip"
              private var methodChannel: MethodChannel? = null

              private val pipReceiver = object : BroadcastReceiver() {
                  override fun onReceive(ctx: Context?, intent: Intent?) {
                      val control = intent?.getStringExtra(CronometroService.EXTRA_CONTROL) ?: return
                      methodChannel?.invokeMethod("pipAction", control)
                  }
              }

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)

                  methodChannel = MethodChannel(
                      flutterEngine.dartExecutor.binaryMessenger, CHANNEL
                  )

                  methodChannel!!.setMethodCallHandler { call, result ->
                      when (call.method) {
                          "enterPiP" -> {
                              val time = call.argument<String>("time") ?: "00:00.00"
                              val isRunning = call.argument<Boolean>("isRunning") ?: false
                              startCronometroService(time, isRunning)
                              enterPiPMode()
                              result.success(null)
                          }
                          "updateNotification" -> {
                              val time = call.argument<String>("time") ?: "00:00.00"
                              val isRunning = call.argument<Boolean>("isRunning") ?: false
                              startCronometroService(time, isRunning)
                              result.success(null)
                          }
                          "dismissNotification" -> {
                              stopService(Intent(this, CronometroService::class.java))
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(pipReceiver,
                          IntentFilter(CronometroService.ACTION_PIP),
                          Context.RECEIVER_NOT_EXPORTED)
                  } else {
                      @Suppress("UnspecifiedRegisterReceiverFlag")
                      registerReceiver(pipReceiver, IntentFilter(CronometroService.ACTION_PIP))
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  try { unregisterReceiver(pipReceiver) } catch (_: Exception) {}
              }

              private fun startCronometroService(time: String, isRunning: Boolean) {
                  val intent = Intent(this, CronometroService::class.java).apply {
                      putExtra(CronometroService.EXTRA_TIME, time)
                      putExtra(CronometroService.EXTRA_IS_RUNNING, isRunning)
                  }
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(intent)
                  } else {
                      startService(intent)
                  }
              }

              private fun enterPiPMode() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val params = PictureInPictureParams.Builder()
                          .setAspectRatio(Rational(16, 9))
                          .build()
                      enterPictureInPictureMode(params)
                  }
              }
          }
          KOTLIN

      - name: 📚 Instalar dependencias Flutter
        working-directory: cronometro_flotante
        run: flutter pub get

      - name: 🔨 Construir APK
        working-directory: cronometro_flotante
        run: flutter build apk --debug --no-shrink

      - name: 📤 Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: cronometro-flotante-v5.0
          path: cronometro_flotante/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: ✅ Build completado
        run: echo "APK listo → Actions → cronometro-flotante-v5.0 → Download"
