name: 🏗️ Construir APK Cronómetro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          path: mysrc

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: 📦 Generar estructura Android (boilerplate)
        run: |
          flutter create \
            --project-name cronometro_flotante \
            --org com.cronometro \
            --platforms android \
            cronometro_flotante

      - name: 📋 Copiar código fuente
        run: |
          cp -rf mysrc/lib/* cronometro_flotante/lib/
          cp mysrc/pubspec.yaml cronometro_flotante/pubspec.yaml

      - name: 🔒 Agregar permisos al AndroidManifest
        working-directory: cronometro_flotante
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Insertar permisos después de la línea de INTERNET
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>|' "$MANIFEST"
          echo "--- AndroidManifest actualizado ---"
          grep -A2 "INTERNET" "$MANIFEST"

      - name: ⚙️ Configurar versiones Android SDK
        working-directory: cronometro_flotante
        run: |
          GRADLE="android/app/build.gradle"
          # flutter_overlay_window requiere minSdk 23 y compileSdk 34
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' "$GRADLE"
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' "$GRADLE"
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' "$GRADLE"
          echo "--- build.gradle actualizado ---"
          grep -E "SdkVersion" "$GRADLE"

      - name: 📚 Instalar dependencias Flutter
        working-directory: cronometro_flotante
        run: flutter pub get

      - name: 🔨 Construir APK
        working-directory: cronometro_flotante
        run: flutter build apk --debug --no-shrink

      - name: 📤 Subir APK como descargable
        uses: actions/upload-artifact@v4
        with:
          name: cronometro-flotante-v1.0
          path: cronometro_flotante/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: ✅ Build completado
        run: |
          echo "APK listo para descargar!"
          echo "Ve a: Actions → cronometro-flotante-v1.0 → Download"
